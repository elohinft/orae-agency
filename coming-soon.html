<style>
:root {
  --dark: #0d0b10;
  --light: #f1f1f1;
  --text-dark: #1a1820;

  --ff-b: 'Urbanist', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; height: 100%; }
body { font-family: var(--ff-b); background: var(--light); color: var(--text-dark); min-height: 100vh; display: flex; flex-direction: column; }

@keyframes logo-breathe { 0%,100%{opacity:.5;transform:scale(1)} 50%{opacity:1;transform:scale(1.12)} }

nav { display: flex; align-items: center; padding: 1.1rem 3rem; border-bottom: 1px solid rgba(26,24,32,0.06); }
.nav-logo svg { width: 30px; height: auto; fill: #1a1820; animation: logo-breathe 3.2s ease-in-out infinite; }

.hero { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 4rem 4rem 5rem; }
.eyebrow { font-family: var(--ff-h); font-size: .6rem; letter-spacing: .22em; text-transform: uppercase; color: rgba(26,24,32,0.28); font-weight: 300; margin-bottom: 1.5rem; }
.title { font-family: var(--ff-h); font-weight: 500; font-size: clamp(2.5rem, 7vw, 6rem); line-height: .95; letter-spacing: -.04em; color: var(--text-dark); margin-bottom: 2rem; }
.sub { font-family: var(--ff-b); font-weight: 300; font-size: .9rem; color: rgba(26,24,32,0.45); line-height: 1.75; max-width: 380px; }
.back { font-family: var(--ff-h); font-size: .72rem; font-weight: 300; color: rgba(26,24,32,0.5); margin-top: 2.5rem; display: inline-flex; align-items: center; gap: .5rem; border-bottom: 1px solid rgba(26,24,32,0.15); padding-bottom: 2px; transition: color .2s; }
.back:hover { color: var(--text-dark); }

footer { padding: .85rem 3rem; border-top: 1px solid rgba(26,24,32,0.06); font-size: .6rem; color: rgba(26,24,32,0.2); font-family: var(--ff-b); font-weight: 300; letter-spacing: .06em; }

@media (max-width:600px) {
  nav { padding: 1rem 1.5rem; }
  .hero { padding: 3rem 1.75rem 4rem; }
  footer { padding: .85rem 1.75rem; }
}
